syntax = "proto3";

package us3_turbo.proxy;

option cc_generic_services = true;

// Mode B：所有控制面经 proxy。client 只与 proxy 交互；proxy 同步转发 GdsPut
// 给 backend，backend RDMA-READ 完返回 etag/crc/bytes，proxy 先 CompleteSession
// （索引提交钩子）再回 client。backend 不再单独暴露给 client。
//
// v1 只实现单对象 GDS PUT；无 HeadObject/Get/multipart/CompleteUpload。

message OpenSessionRequest {
  string request_id   = 1;
  string session_id   = 2;
  string bucket       = 3;
  string object_key   = 4;
  uint64 expected_size = 5;
}

message OpenSessionResponse {
  string request_id = 1;
  string session_id = 2;
  string ticket     = 3;
}

message GdsChunkRequest {
  string request_id       = 1;
  string session_id       = 2;
  string transfer_ticket  = 3;
  string bucket           = 4;
  string object_key       = 5;
  uint64 chunk_size       = 6;
  string rdma_token       = 7;
}

message GdsChunkResponse {
  string etag          = 1;
  uint32 crc32c        = 2;
  uint64 bytes_received = 3;
}

message AbortSessionRequest {
  string session_id = 1;
}

message AbortSessionResponse {}

service Control {
  rpc OpenSession(OpenSessionRequest) returns (OpenSessionResponse);
  rpc GdsPut(GdsChunkRequest) returns (GdsChunkResponse);
  rpc AbortSession(AbortSessionRequest) returns (AbortSessionResponse);
}
